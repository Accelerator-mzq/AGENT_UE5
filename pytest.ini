[pytest]
cache_dir = TestArtifacts/PytestCache
addopts = --basetemp=TestArtifacts/PytestTemp
# Phase 12: 让 `pytest` 直接调用就把项目根加 sys.path,与 `python -m pytest` 等价
# 影响:T01-T05 新增 smoke 测试用 `from Plugins.AgentBridge.Compiler.providers...` 形式 import,
# 没有 pythonpath=. 时直接 `pytest` 会 ModuleNotFoundError(`python -m pytest` 因 cwd 在 sys.path 而 OK)
pythonpath = .
markers =
    real_ue: requires running UE 5.5.4 Editor with RC API enabled (port 30010)
