# Input Selector — Results Screen 从上游产物中选取所需信息

include_sections:
  - game_identity           # 项目名称
  - phase_scope             # 当前阶段范围
  - baseline_capabilities.results  # Root Skill Contract 中的结果页标注

exclude_sections:
  - design_domains           # gameplay 域不在本 Skill 范围（胜负判定由 gameplay 处理）
  - baseline_capabilities.start_screen  # 入口壳层不在本 Skill 范围
  - baseline_capabilities.main_menu     # 主菜单不在本 Skill 范围
  - baseline_capabilities.settings      # 设置页不在本 Skill 范围
  - baseline_capabilities.pause         # 暂停菜单不在本 Skill 范围
  - implementation_hints     # 实现细节不在编译层
