# Input Selector — Start Screen 从上游产物中选取所需信息

include_sections:
  - game_identity           # 项目名称、Logo 信息
  - phase_scope             # 当前阶段范围
  - baseline_capabilities.start_screen  # Root Skill Contract 中的入口壳层标注

exclude_sections:
  - design_domains           # 所有 gameplay 域不在本 Skill 范围
  - baseline_capabilities.main_menu    # 主菜单逻辑不在本 Skill 范围
  - baseline_capabilities.settings     # 设置页不在本 Skill 范围
  - implementation_hints     # 实现细节不在编译层
