template_id: baseline.hud.realization_eligible
display_name: HUD（常驻界面）
template_kind: baseline_skill
genre: universal
template_version: "1.0.0"
schema_version: "1.0.0"
evaluator_version: "1.0.0"

phase_scope:
  - phase1_local_multiplayer

description: |
  HUD Baseline 模板。realization_eligible 级别。
  最低标准：当前回合数 + 当前玩家标识。
  具体内容由 gameplay 域决定，因此默认 realization_eligible。
  通过 Discovery 探索 HUD 布局、信息密度、动态显隐等设计维度。

realization_class: realization_eligible

input_contract_ref: root_skill_contract.baseline_capabilities.hud
output_schema_ref: output_schema.json

requires_static_vocab:
  - hud_element
  - data_binding
  - hud_layout

can_emit_families:
  - hud_spec

depends_on_templates: []

gameplay_coupling:
  - turn_loop
  - property_economy
  - jail_and_bankruptcy

priority: medium

# Phase 13: 能力绑定(原 skill_graph_planning.BASELINE_NODE_CONFIGS 数据下沉,逐字照抄)
capability_bindings:
  - capability_id: baseline-hud
    instance_id: skill-baseline-hud
    convergence_priority: 4
    related_clarification_items:
      - cg-hud-layout-style
      - cg-dice-roll-feedback
    planning_notes:
      - "HUD 是 realization_eligible baseline，允许进入后续 Design Space Discovery。"
    fragment_family: hud_spec
