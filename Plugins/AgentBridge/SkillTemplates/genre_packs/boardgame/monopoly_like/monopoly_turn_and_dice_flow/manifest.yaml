template_id: monopoly.turn_and_dice_flow.phase1
display_name: Monopoly Phase-1 Turn & Dice Flow
template_kind: genre_skill
genre: monopoly_like
template_version: "1.0.0"
schema_version: "1.0.0"
evaluator_version: "1.0.0"

phase_scope:
  - phase1_local_multiplayer

description: |
  从 GDD 中提取回合流转规则和骰子规则：
  回合状态机、掷骰逻辑、移动规则、双数再掷、三连双数入狱、过起点奖励。

input_contract_ref: gdd_projection.design_domains.turn_loop + jail_rules(入狱触发部分)
output_schema_ref: output_schema.json

requires_static_vocab:
  - turn_phase
  - dice_result
  - movement_step
  - doubles_count

can_emit_families:
  - turn_flow_spec
  - dice_rule_spec
  - movement_rule_spec

depends_on_templates:
  - monopoly.board_topology.phase1

# Phase 13: 能力绑定(原 skill_graph_planning.GAMEPLAY_NODE_CONFIGS 数据下沉,逐字照抄)
capability_bindings:
  - capability_id: gameplay-turn-loop
    instance_id: skill-turn-loop
    convergence_priority: 3
    related_clarification_items:
      - cg-max-game-length
    planning_notes:
      - "Turn Loop 组织掷骰、移动、过起点奖励与回合切换，是 gameplay 主骨架。"
    fragment_family: turn_flow_spec
  - capability_id: gameplay-dice
    instance_id: skill-dice
    convergence_priority: 2
    related_clarification_items:
      - cg-dice-roll-feedback
    planning_notes:
      - "Dice 节点单独保留，方便后续把规则语义与表现反馈拆开处理。"
    fragment_family: dice_rule_spec
