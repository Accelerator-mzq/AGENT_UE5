template_id: monopoly.jail_and_bankruptcy.phase1
display_name: Monopoly Phase-1 Jail & Bankruptcy
template_kind: genre_skill
genre: monopoly_like
template_version: "1.0.0"
schema_version: "1.0.0"
evaluator_version: "1.0.0"

phase_scope:
  - phase1_local_multiplayer

description: |
  从 GDD 中提取监狱系统和破产规则：
  入狱条件、在狱中行为、出狱方式、破产触发、玩家淘汰、游戏结束。

input_contract_ref: gdd_projection.design_domains.jail_rules + bankruptcy_rules
output_schema_ref: output_schema.json

requires_static_vocab:
  - jail_state
  - bankruptcy_trigger
  - player_state

can_emit_families:
  - jail_rule_spec
  - bankruptcy_rule_spec

depends_on_templates:
  - monopoly.turn_and_dice_flow.phase1
  - monopoly.property_economy.phase1

# Phase 13: 能力绑定(原 skill_graph_planning.GAMEPLAY_NODE_CONFIGS 数据下沉,逐字照抄)
capability_bindings:
  - capability_id: gameplay-player-management
    instance_id: skill-player-management
    convergence_priority: 5
    related_clarification_items:
      - cg-max-game-length
      - cg-player-token-visual-style
    planning_notes:
      - "Player Management 负责玩家顺序、存活状态、淘汰与最终胜者归属。"
    fragment_family: player_management_spec
  - capability_id: gameplay-jail
    instance_id: skill-jail
    convergence_priority: 5
    related_clarification_items: []
    planning_notes:
      - "Jail 作为独立节点保留，便于后续把入狱、出狱与破产关系拆分审查。"
    fragment_family: jail_rule_spec
