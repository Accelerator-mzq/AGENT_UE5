# Boardgame Genre Pack Manifest
# 基于 Genre_Skill_Pack_Manifest_标准_v1

# 类型包标识
pack_id: "genre-boardgame"
version: "0.1.0"
title: "Boardgame Genre Skill Pack"
status: "minimal_skeleton"
description: "棋盘游戏类型包，支持回合制棋盘游戏的编译与执行"

# 路由器配置
router:
  primary_router: "genre_boardgame_router"
  fallback_routers: []

# 激活条件
activation:
  # 当 GDD 中包含以下关键词时，激活此类型包
  keywords:
    - "boardgame"
    - "棋盘游戏"
    - "board game"
    - "棋盘"
    - "回合制"
  # 最小置信度（0-1）
  min_confidence: 0.7

# 依赖
dependencies:
  base_domains:
    - "product_scope"
    - "world_level"
    - "presentation_asset"
  static_base:
    - "GameplayFrameworkStaticSpec"
    - "WorldBuildStaticSpec"

# 必需 Skills（第一阶段占位）
required_skills: []

# 可选 Skills（第一阶段占位）
optional_skills: []

# Review 扩展（第一阶段占位）
review_extensions: []

# Validation 扩展（第一阶段占位）
validation_extensions: []

# Delta Policy（第一阶段占位）
delta_policy:
  enabled: false
  note: "Brownfield 能力待后续补充"

# 通用策略偏好
policy:
  prefer_incremental: true
  allow_mixed_mode: false

# 典型产物（第一阶段占位）
outputs:
  typical_specs:
    - "scene_spec"
  typical_workflows:
    - "spawn_actor"

# 元信息
metadata:
  author: "AgentBridge Team"
  created_at: "2026-03-30"
  last_updated: "2026-03-30"
  note: "第一阶段只包含最小骨架，完整实现待后续补充"
